<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="tGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00a8cc"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="8" y="8" width="240" height="240" rx="40" ry="40" fill="url(#bgGrad)" stroke="#1e2430" stroke-width="2"/>

  <!-- T vertical bar -->
  <rect x="104" y="56" width="48" height="144" rx="12" ry="12" fill="url(#tGrad)"/>

  <!-- T horizontal bar -->
  <rect x="52" y="56" width="152" height="40" rx="12" ry="12" fill="url(#tGrad)"/>

  <!-- Lightning bolt -->
  <polygon points="172,92 132,128 148,128 128,164 168,128 152,128" fill="url(#boltGrad)" filter="url(#glow)" opacity="0.9"/>
</svg>
